name: tg_collector
on:
  workflow_dispatch:
  push:
    paths:
      - 'tg_collector.py'
      - '.github/workflows/tg_collector.yml'
  schedule:
    - cron: '0 */1 * * *' # 每小时运行一次

jobs:
  run-collector:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
         

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      - name: Run Collector Script
        run: python tg_collector.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add tg_collector.txt sub.txt valid_subs.txt tg_channel_stats.csv
          
          if git diff --cached --quiet; then
            echo "没有检测到文件变动，跳过。"
          else
            export TZ='Asia/Shanghai'
            NODE_COUNT=$(grep -c '://' tg_collector.txt || echo 0)
            SUB_COUNT=$(wc -l < valid_subs.txt || echo 0)
            
            git commit -m "Auto Update | 节点: $NODE_COUNT | 订阅: $SUB_COUNT | $(date +'%Y-%m-%d %H:%M:%S')"
            
            git pull origin main --rebase
            
            git push origin main
          fi
