name: filter_nodes

on:
  workflow_dispatch:
  push:
    paths:
      - 'filter_nodes.py'
      - '.github/workflows/filter_nodes.yml'
      - 'trial.cache'

jobs:
  run-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Script
        run: python filter_nodes.py

      - name: Commit & Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          git add filter_nodes.txt filter_subs.txt 
          if git diff --cached --quiet; then
            echo "No changes"
          else
            export TZ='Asia/Shanghai'
            git commit -m "Update filtered results: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
