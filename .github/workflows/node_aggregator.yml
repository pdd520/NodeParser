name: node_aggregator

on:
  push:
    paths:
      - 'node_aggregator.py'
      - '.github/workflows/harvester.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *' 

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests pyyaml geoip2
      - run: sudo timedatectl set-timezone Asia/Shanghai

      - name: 执行
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python node_aggregator.py

      - name: 提交
        run: |
          git config --local user.email "GitHub Action"
          git config --local user.name "action@github.com"
          git add nodes.txt source_stats.csv
          if ! git diff --cached --quiet; then
            git commit -m "💎 新节点: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
