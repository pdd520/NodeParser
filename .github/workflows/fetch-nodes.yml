name: Fetch Free Nodes Daily

on:
  schedule:
    - cron: '0 */3 * * *'
  push:
    paths:
      - 'fetch_nodes.py'
      - 'fetch-nodes.yml'
      - '.github/workflows/fetch-nodes.yml'
      - 'requirements.txt' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # 缓存 pip 依赖

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fetch Nodes Script
        run: python fetch_nodes.py
        continue-on-error: true

      - name: Check for Changes
        id: check-changes
        run: |
          git add nodes.txt stats.csv  nodes.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git commit -m "Update clash.yaml, stats.csv with latest free nodes $(date -u)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

     
